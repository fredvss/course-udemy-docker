services:
  frontend:
    container_name: frontend
    image: nginx:1.27-alpine
    ports:
      - "8084:80"

  nodeapp:
    container_name: nodeapp
    build: 
      context: ../02-build-node
      dockerfile: Dockerfile
      args:
        - VERSION=1.0.2
    environment:
      - PORT=5000
    ports:
      - "4000:5000"

  pythonapp:
    container_name: pythonapp
    build: 
      context: ../06-build-python-healthcheck
      dockerfile: Dockerfile
      args:
        - VERSION=1.0.5
    environment:
      - PORT=4500
    ports:
      - "4001:4500"
    depends_on:
      - nodeapp