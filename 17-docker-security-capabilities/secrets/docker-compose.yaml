services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      # Senha lida do secret — nunca em texto claro na variável de ambiente
      MYSQL_PASSWORD_FILE: /run/secrets/wp_db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/wp_db_root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend
    secrets:
      - wp_db_password
      - wp_db_root_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role == manager"

  wordpress:
    image: wordpress:latest
    ports:
      - "80:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      # Variável especial do WordPress: lê o conteúdo do arquivo indicado
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/wp_db_password
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
    networks:
      - backend
      - frontend
    secrets:
      - wp_db_password
    deploy:
      replicas: 3

volumes:
  db_data:
  wp_data:

networks:
  backend:
    driver: overlay
    driver_opts:
      encrypted: "true"
  frontend:
    driver: overlay

# Secrets referenciados acima devem ser criados no Swarm antes do deploy:
#   echo "senha_do_banco"  | docker secret create wp_db_password -
#   echo "senha_do_root"   | docker secret create wp_db_root_password -
#
# Secrets declarados aqui como "external: true" (padrão quando não há "file:")
# → o Swarm os busca no armazenamento criptografado do cluster.
secrets:
  wp_db_password:
    external: true
  wp_db_root_password:
    external: true
