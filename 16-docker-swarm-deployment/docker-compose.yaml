services:
  flaskapp:
    # --- Passo 1: deploy inicial saudável ---
    image: mateusmuller2/flaskapp:healthy
    #
    # --- Passo 2: tentar atualizar para a versão não saudável ---
    # O Swarm executa o healthcheck de cada nova task antes de promovê-la.
    # Como a imagem :unhealthy falha no healthcheck, o Swarm interrompe o
    # rolling update e executa o rollback automático para :healthy.
    # image: mateusmuller2/flaskapp:unhealthy
    #
    # --- Passo 3: atualizar para nginx (imagem saudável) ---
    # O rolling update avança de 2 em 2 réplicas (parallelism: 2).
    # Cada par só é promovido após passar no healthcheck.
    # image: nginx
    networks:
      - flaskapp
    ports:
      - 5000:5000
    deploy:
      replicas: 10
      update_config:
        parallelism: 2          # atualiza 2 réplicas por vez
        failure_action: rollback # reverte tudo se alguma task falhar o healthcheck
        order: start-first       # sobe a nova task antes de derrubar a antiga (zero downtime)

networks:
  flaskapp:
    driver: overlay
    attachable: true
    name: flaskapp
    driver_opts:
      encrypted: "true"
